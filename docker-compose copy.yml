services:

  backend:
    build: ./backend
    container_name: backend
    env_file:
      - .env
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - devops-net

  frontend:
    image: nginx:latest
    container_name: frontend
    ports:
      - "8080:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      backend:
        condition: service_healthy

    restart: always

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - devops-net

networks:
  devops-net:
    driver: bridge